name: PR Validation

# Two trigger modes:
#   pull_request       — direct PR in this repo (testing on personal GitHub)
#   repository_dispatch type=css-pr-opened — fired by css repo when a PR is opened there
#   workflow_dispatch  — manual test run
on:
  pull_request:
    types: [opened, synchronize, reopened]
  repository_dispatch:
    types: [css-pr-opened]
  workflow_dispatch:
    inputs:
      test_files:
        description: 'Space-separated changed files to test (e.g. client/dialog/azcd01/foo.c)'
        required: false
        default: 'client/dialog/azcd01/foo.c host/batch/SOMCOB.cbl db/codestable/SOMETBL.dat'

jobs:
  itt-check:
    name: ITT Reference Check
    # PERSONAL GITHUB: ubuntu-latest (free, no self-hosted runner needed)
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout pipeline repo (scripts)
        uses: actions/checkout@v4

      - name: Validate ITT reference in last PR commit
        if: github.event_name != 'workflow_dispatch'
        env:
          GITHUB_TOKEN: >-
            ${{
              github.event_name == 'repository_dispatch'
              && secrets.CSS_REPO_TOKEN
              || secrets.GITHUB_TOKEN
            }}
          GITHUB_REPOSITORY: >-
            ${{
              github.event_name == 'repository_dispatch'
              && github.event.client_payload.source_repo
              || github.repository
            }}
          PR_NUMBER: >-
            ${{
              github.event_name == 'repository_dispatch'
              && github.event.client_payload.pr_number
              || github.event.pull_request.number
            }}
        run: python scripts/itt_check.py

      - name: Skip ITT check (manual test run)
        if: github.event_name == 'workflow_dispatch'
        run: echo "workflow_dispatch — ITT check skipped for manual testing"

  diff-analysis:
    name: Diff Analysis + Classify
    needs: itt-check
    # PERSONAL GITHUB: ubuntu-latest
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          path: pipeline

      - name: Checkout CSS source
        uses: actions/checkout@v4
        with:
          repository: >-
            ${{
              github.event_name == 'repository_dispatch'
              && github.event.client_payload.source_repo
              || github.repository
            }}
          ref: >-
            ${{
              github.event_name == 'repository_dispatch'
              && github.event.client_payload.sha
              || github.event.pull_request.head.sha
            }}
          token: >-
            ${{
              github.event_name == 'repository_dispatch'
              && secrets.CSS_REPO_TOKEN
              || secrets.GITHUB_TOKEN
            }}
          path: css-source
          fetch-depth: 0

      - name: Get changed files (git diff)
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "${{ inputs.test_files }}" | tr ' ' '\n' > ../changed_files.txt
          else
            BASE="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.base_sha || github.event.pull_request.base.sha }}"
            HEAD="${{ github.event_name == 'repository_dispatch' && github.event.client_payload.sha || github.event.pull_request.head.sha }}"
            echo "Base: $BASE  Head: $HEAD"
            cd css-source
            git diff --name-only "${BASE}...${HEAD}" | tee ../changed_files.txt
          fi
          echo "--- $(wc -l < ../changed_files.txt | tr -d ' ') files changed ---"
          cat ../changed_files.txt || echo "(none)"

      - name: Diff analysis
        shell: bash
        run: |
          FILES=$(cat changed_files.txt | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No changed files."
            echo "[]" > modules.json
          else
            cd css-source
            python ../pipeline/scripts/diff_analysis.py --files $FILES > ../modules.json
            cd ..
          fi
          echo "=== Modules ==="
          cat modules.json

      - name: Classify modules
        shell: bash
        run: |
          python pipeline/scripts/classify_modules.py \
            --stdin \
            < modules.json \
            | tee classified.json
          echo "=== Classified ==="
          cat classified.json

      - name: Resolve build sequence
        shell: bash
        run: |
          python pipeline/scripts/resolve_build_sequence.py \
            --modules-json classified.json \
            --rules pipeline/build-sequence-rules.json \
            | tee waves.json
          echo "=== Waves ==="
          cat waves.json

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
