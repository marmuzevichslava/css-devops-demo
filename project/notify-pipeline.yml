name: Notify Pipeline

# This workflow lives in the CSS SOURCE repo (css-demo-test).
# It fires a repository_dispatch event to the PIPELINE repo (css-devops-test)
# whenever a PR is opened, updated, or reopened.
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  notify:
    name: Notify css-devops-test
    runs-on: ubuntu-latest

    steps:
      - name: Send repository_dispatch to pipeline repo
        uses: actions/github-script@v7
        with:
          # PIPELINE_REPO_TOKEN must have repo access to css-devops-test
          github-token: ${{ secrets.PIPELINE_REPO_TOKEN }}
          script: |
            const prNumber   = context.payload.pull_request.number;
            const headSha    = context.payload.pull_request.head.sha;
            const baseSha    = context.payload.pull_request.base.sha;
            const sourceRepo = context.repo.owner + '/' + context.repo.repo;
            const ref        = context.payload.pull_request.head.ref;

            console.log(`Dispatching css-pr-opened for PR #${prNumber} (${sourceRepo})`);
            console.log(`  head: ${headSha}`);
            console.log(`  base: ${baseSha}`);

            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo:  'css-devops-test',
              event_type: 'css-pr-opened',
              client_payload: {
                pr_number:   prNumber,
                source_repo: sourceRepo,
                sha:         headSha,
                base_sha:    baseSha,
                ref:         ref,
              }
            });
