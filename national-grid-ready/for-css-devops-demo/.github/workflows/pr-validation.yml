# pr-validation.yml
# Живёт в css-devops-demo (pipeline repo).
# Запускается двумя способами:
#   1. repository_dispatch "css-pr-opened" — когда developer открыл PR в css-demo
#   2. workflow_dispatch — ручной запуск для отладки (можно указать тестовые файлы)
#
# Jobs:
#   1. itt-check       — проверяет что в последнем squash commit есть ITT:[число]
#   2. diff-analysis   — определяет какие модули изменились и их типы

name: PR Validation

on:
  repository_dispatch:
    types: [css-pr-opened]
  workflow_dispatch:
    inputs:
      test_files:
        description: 'Тестовые файлы для ручного запуска (через пробел)'
        required: false
        # default используется только при ручном запуске через UI.
        # В production (repository_dispatch) этот default не используется —
        # там берутся реальные changed files из git diff.
        default: 'client/dialog/azcd01/foo.c host/batch/SOMCOB.cbl'

jobs:
  itt-check:
    name: ITT Reference Check
    # National Grid: self-hosted runner на azuse-cssdapp01
    runs-on: [self-hosted, windows, compile]

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout pipeline repo (нужны scripts/)
        uses: actions/checkout@v4

      - name: Validate ITT reference in last PR commit
        if: github.event_name != 'workflow_dispatch'
        env:
          # CSS_REPO_TOKEN — секрет в css-devops-demo.
          # PAT с repo scope, чтобы читать коммиты из css-demo (другой репо).
          GITHUB_TOKEN: ${{ secrets.CSS_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.event.client_payload.source_repo }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
        run: python scripts\itt_check.py

      - name: Skip ITT check (ручной запуск)
        if: github.event_name == 'workflow_dispatch'
        run: echo "workflow_dispatch — ITT check пропущен для ручного теста"

  diff-analysis:
    name: Diff Analysis + Classify + Build Sequence
    needs: itt-check
    # National Grid: self-hosted runner на azuse-cssdapp01
    runs-on: [self-hosted, windows, compile]

    permissions:
      contents: read

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          path: pipeline

      - name: Checkout CSS source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.client_payload.source_repo }}
          ref: ${{ github.event.client_payload.sha }}
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: css-source
          fetch-depth: 0

      - name: Get changed files (git diff)
        id: changed
        shell: bash
        run: |
          BASE="${{ github.event.client_payload.base_sha }}"
          HEAD="${{ github.event.client_payload.sha }}"
          echo "Base: $BASE  Head: $HEAD"
          cd css-source
          git diff --name-only "${BASE}...${HEAD}" | tee ../changed_files.txt
          echo "--- $(wc -l < ../changed_files.txt | tr -d ' ') files changed ---"

      - name: Diff analysis — changed files → module IDs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            FILES="${{ inputs.test_files }}"
          else
            FILES=$(cat changed_files.txt | tr '\n' ' ')
          fi
          if [ -z "$FILES" ]; then
            echo "No changed files."
            echo "[]" > modules.json
          else
            cd css-source
            python ../pipeline/scripts/diff_analysis.py --files $FILES > ../modules.json
          fi
          echo "=== Modules ==="
          cat modules.json

      - name: Classify modules
        shell: bash
        run: |
          python pipeline/scripts/classify_modules.py --stdin < modules.json | tee classified.json
          echo "=== Classified ==="
          cat classified.json

      - name: Resolve build sequence
        shell: bash
        run: |
          python pipeline/scripts/resolve_build_sequence.py \
            --modules-json classified.json \
            --rules pipeline/build-sequence-rules.json \
            | tee waves.json
          echo "=== Waves ==="
          cat waves.json

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
