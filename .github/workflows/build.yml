name: Build Pipeline

# Triggered after merge to main, or manually for testing.
# PERSONAL GITHUB: windows-latest (free GitHub-hosted Windows runner)
# NG: change runs-on to [self-hosted, windows, compile]
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      changed_files:
        description: 'Space-separated changed files (e.g. client/dialog/azcd01/foo.c host/batch/X.cbl)'
        required: false
        default: 'client/dialog/azcd01/azcd01.c host/batch/SOMCOB01/SOMCOB01.cbl db/codestable/STATBL.dat'

jobs:
  build:
    name: Analyse + Compile + Manifest
    runs-on: windows-latest   # TODO NG: [self-hosted, windows, compile]

    permissions:
      contents: read

    steps:
      # 1. Checkout css-devops-demo (scripts + rules)
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Determine changed files
      - name: Get changed files
        id: changed
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.changed_files }}" -ne "") {
            $files = "${{ inputs.changed_files }}" -split ' '
          } else {
            $files = git diff --name-only "${{ github.event.before }}...${{ github.sha }}" | Where-Object { $_ -ne "" }
          }
          $files | ConvertTo-Json -Compress | Out-File -FilePath changed_files.json -Encoding utf8
          Write-Host "Changed files: $($files -join ', ')"

      # 3. Extract ITT tickets from commit messages
      - name: Extract ITT tickets
        id: itt
        shell: pwsh
        run: |
          $messages = git log --format="%B" "${{ github.event.before }}..${{ github.sha }}" 2>$null
          if (-not $messages) { $messages = git log -1 --format="%B" }
          $tickets = [System.Collections.Generic.HashSet[int]]::new()
          $matches = [regex]::Matches($messages, '(?i)ITT:\[(\d+(?:,\s*\d+)*)\]')
          foreach ($m in $matches) {
            foreach ($n in $m.Groups[1].Value -split ',') {
              $tickets.Add([int]$n.Trim()) | Out-Null
            }
          }
          $ticketList = ($tickets | Sort-Object) -join ' '
          Write-Host "ITT tickets found: $ticketList"
          echo "tickets=$ticketList" >> $env:GITHUB_OUTPUT

      # 4. Diff analysis — changed files → module IDs
      - name: Diff analysis
        shell: pwsh
        run: |
          $files = (Get-Content changed_files.json | ConvertFrom-Json) -join ' '
          if (-not $files) { '[]' | Out-File classified_raw.json; exit 0 }
          python scripts/diff_analysis.py --files $files.Split(' ') | Out-File classified_raw.json
          Get-Content classified_raw.json

      # 5. Classify modules → types (C_PROJECT / COBOL / CODES_TABLE / etc.)
      - name: Classify modules
        shell: pwsh
        run: |
          Get-Content classified_raw.json | python scripts/classify_modules.py --stdin | Out-File classified.json
          Get-Content classified.json

      # 6. Resolve build sequence → compilation waves
      - name: Resolve build sequence
        shell: pwsh
        run: |
          python scripts/resolve_build_sequence.py `
            --modules-json classified.json `
            --rules build-sequence-rules.json `
            | Out-File waves.json
          Get-Content waves.json

      # 7a. Compile C projects — BUILD binary [PLACEHOLDER — MSBuild TBD]
      - name: Compile C projects (BUILD binary)
        shell: pwsh
        run: |
          $waves = (Get-Content waves.json | ConvertFrom-Json).waves
          $classified = Get-Content classified.json | ConvertFrom-Json
          foreach ($wave in $waves) {
            Write-Host "--- Wave $($wave.wave) (BUILD) ---"
            foreach ($moduleId in $wave.modules) {
              $mod = $classified | Where-Object { $_.module_id -eq $moduleId }
              if ($mod.type -notin @('C_PROJECT', 'AGS_MODULE')) { continue }
              Write-Host "  [PLACEHOLDER] MSBuild BUILD: $moduleId"
              # TODO NG: msbuild <vcxproj> /p:Configuration=Release /p:Platform=Win32 /p:ENV_TARGET=BUILD
            }
          }

      # 7b. Compile C projects — SVT binary [PLACEHOLDER]
      - name: Compile C projects (SVT binary)
        shell: pwsh
        run: |
          $waves = (Get-Content waves.json | ConvertFrom-Json).waves
          $classified = Get-Content classified.json | ConvertFrom-Json
          foreach ($wave in $waves) {
            Write-Host "--- Wave $($wave.wave) (SVT) ---"
            foreach ($moduleId in $wave.modules) {
              $mod = $classified | Where-Object { $_.module_id -eq $moduleId }
              if ($mod.type -notin @('C_PROJECT', 'AGS_MODULE')) { continue }
              Write-Host "  [PLACEHOLDER] MSBuild SVT: $moduleId"
              # TODO NG: msbuild <vcxproj> /p:Configuration=Release /p:Platform=Win32 /p:ENV_TARGET=SVT
            }
          }

      # 8. Stage COBOL source for deploy-time compilation
      - name: Stage COBOL source
        shell: pwsh
        run: |
          $classified = Get-Content classified.json | ConvertFrom-Json
          $cobolModules = $classified | Where-Object { $_.type -eq 'COBOL' }
          if ($cobolModules.Count -eq 0) {
            Write-Host "No COBOL modules - skipping."
            exit 0
          }
          foreach ($mod in $cobolModules) {
            $dest = "artifacts\COBOL\$($mod.module_id | Split-Path -Leaf)"
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            if (Test-Path $mod.module_id) {
              Copy-Item -Path "$($mod.module_id)\*" -Destination $dest -Recurse -Force
            }
            Write-Host "Staged COBOL: $($mod.module_id) -> $dest"
          }

      # 9. Generate build manifest
      - name: Generate build manifest
        shell: pwsh
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          $changed = (Get-Content changed_files.json | ConvertFrom-Json) -join ' '
          $tickets = "${{ steps.itt.outputs.tickets }}"
          if (-not $tickets) { $tickets = "0" }
          python scripts/build_manifest.py `
            --classified-json classified.json `
            --changed-files $changed `
            --itt-tickets $tickets `
            --output build_manifest.json
          Write-Host "=== Build Manifest ==="
          Get-Content build_manifest.json

      # 10. Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.run_id }}
          path: |
            build_manifest.json
            classified.json
            waves.json
            artifacts/
          retention-days: 30
