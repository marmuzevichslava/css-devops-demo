name: TEST — PR Validation (ubuntu-latest)

# Тестовая версия pr-validation.yml для личного GitHub аккаунта.
# Использует ubuntu-latest вместо self-hosted windows runner.
# Запускается вручную или при открытии PR в этом же репо.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      test_files:
        description: 'Space-separated changed files (e.g. client/dialog/azcd01/foo.c)'
        required: false
        default: 'client/dialog/azcd01/foo.c host/batch/SOMCOB.cbl db/codestable/SOMETBL.dat'

jobs:
  itt-check:
    name: ITT Reference Check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate ITT reference in last PR commit
        if: github.event_name != 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/itt_check.py

      - name: Skip ITT check (manual test run)
        if: github.event_name == 'workflow_dispatch'
        run: echo "workflow_dispatch — ITT check skipped for manual testing"

  diff-and-classify:
    name: Diff Analysis + Classify + Build Sequence
    needs: itt-check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files (git diff or manual input)
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "${{ inputs.test_files }}" | tr ' ' '\n' > changed_files.txt
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > changed_files.txt
          fi
          echo "--- Changed files ---"
          cat changed_files.txt || echo "(none)"

      - name: Diff analysis — changed files → module IDs
        run: |
          FILES=$(cat changed_files.txt | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No changed files."
            echo "[]" > modules.json
          else
            python scripts/diff_analysis.py --files $FILES > modules.json
          fi
          echo "=== Modules ==="
          cat modules.json

      - name: Classify modules
        run: |
          python scripts/classify_modules.py --stdin < modules.json | tee classified.json
          echo "=== Classified ==="
          cat classified.json

      - name: Resolve build sequence
        run: |
          python scripts/resolve_build_sequence.py \
            --modules-json classified.json \
            --rules build-sequence-rules.json \
            | tee waves.json
          echo "=== Compilation waves ==="
          cat waves.json

      - name: Generate build manifest (dry run)
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || '0' }}
        run: |
          python scripts/build_manifest.py \
            --classified-json classified.json \
            --changed-files $(cat changed_files.txt | tr '\n' ' ') \
            --itt-tickets 9999 \
            --output build_manifest.json
          echo "=== Build Manifest ==="
          cat build_manifest.json

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-pipeline-results-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
            build_manifest.json
