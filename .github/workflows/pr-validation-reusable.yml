name: PR Validation (Reusable)

# This workflow is called by css-demo via workflow_call.
# All pipeline logic lives here in css-devops-demo.
# css-demo only has a minimal 5-line caller — so its git history stays clean.
on:
  workflow_dispatch:
    inputs:
      test_files:
        description: 'Test files (e.g. client/dialog/azcd01/foo.c)'
        required: false
        default: 'client/dialog/azcd01/foo.c'
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      base_sha:
        required: true
        type: string
    secrets:
      CSS_REPO_TOKEN:
        required: true

jobs:
  itt-check:
    name: ITT Reference Check
    runs-on: windows-latest   # TODO NG: [self-hosted, windows, compile]

    permissions:
      contents: read

    steps:
      - name: Checkout pipeline repo (scripts)
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}

      - name: Resolve PR number (manual run = latest open PR)
        id: resolve_pr
        if: github.event_name == 'workflow_dispatch'
        shell: powershell
        run: |
          $prs = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/marmuzevichslava/css-demo/pulls?state=open&sort=updated&direction=desc&per_page=1" `
            -Headers @{ Authorization = "Bearer ${{ secrets.CSS_REPO_TOKEN }}"; Accept = "application/vnd.github+json" }
          if ($prs.Count -eq 0) {
            Write-Host "No open PRs - skipping ITT check"
            echo "pr_number=" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Latest open PR: #$($prs[0].number)"
            echo "pr_number=$($prs[0].number)" >> $env:GITHUB_OUTPUT
          }

      - name: Validate ITT reference in last PR commit
        if: inputs.pr_number != '' || steps.resolve_pr.outputs.pr_number != ''
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.CSS_REPO_TOKEN }}
          SOURCE_REPO: ${{ inputs.source_repo || 'marmuzevichslava/css-demo' }}
          PR_NUMBER: ${{ inputs.pr_number || steps.resolve_pr.outputs.pr_number }}
        run: python scripts\itt_check.py

  diff-analysis:
    name: Diff Analysis + Classify + Build Sequence
    needs: itt-check
    runs-on: windows-latest   # TODO NG: [self-hosted, windows, compile]

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: pipeline

      - name: Checkout CSS source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: css-source
          fetch-depth: 0

      - name: Get changed files
        shell: powershell
        run: |
          $base = "${{ inputs.base_sha }}"
          $head = "${{ inputs.head_sha }}"
          if ($base -and $head) {
            $files = git -C css-source diff --name-only "$base...$head"
          } else {
            $files = @()
            Write-Host "No SHA provided (workflow_dispatch) - empty diff"
          }
          $files | Out-File -FilePath changed_files.txt -Encoding utf8
          Write-Host "--- $($files.Count) files changed ---"
          Get-Content changed_files.txt

      - name: Diff analysis
        shell: powershell
        run: |
          $files = (Get-Content changed_files.txt | Where-Object { $_ -ne "" }) -join ' '
          if (-not $files) {
            '[]' | Out-File "$env:GITHUB_WORKSPACE\modules.json" -Encoding utf8
          } else {
            Push-Location css-source
            python "$env:GITHUB_WORKSPACE\pipeline\scripts\diff_analysis.py" --files $files.Split(' ') | Out-File "$env:GITHUB_WORKSPACE\modules.json" -Encoding utf8
            Pop-Location
          }
          Get-Content "$env:GITHUB_WORKSPACE\modules.json"

      - name: Classify modules
        shell: cmd
        run: |
          python "%GITHUB_WORKSPACE%\pipeline\scripts\classify_modules.py" --stdin ^
            < "%GITHUB_WORKSPACE%\modules.json" ^
            > "%GITHUB_WORKSPACE%\classified.json"
          type "%GITHUB_WORKSPACE%\classified.json"

      - name: Resolve build sequence
        shell: cmd
        run: |
          python "%GITHUB_WORKSPACE%\pipeline\scripts\resolve_build_sequence.py" ^
            --modules-json "%GITHUB_WORKSPACE%\classified.json" ^
            --rules "%GITHUB_WORKSPACE%\pipeline\build-sequence-rules.json" ^
            > "%GITHUB_WORKSPACE%\waves.json"
          type "%GITHUB_WORKSPACE%\waves.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
