name: PR Validation (Reusable)

# This workflow is called by css-demo via workflow_call.
# All pipeline logic lives here in css-devops-demo.
# css-demo only has a minimal 5-line caller — so its git history stays clean.
on:
  workflow_dispatch:   # adds "Run workflow" button in css-devops-demo Actions
    inputs:
      test_files:
        description: 'Test files (e.g. client/dialog/azcd01/foo.c)'
        required: false
        default: 'client/dialog/azcd01/foo.c'
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      base_sha:
        required: true
        type: string
    secrets:
      CSS_REPO_TOKEN:
        required: true

jobs:
  itt-check:
    name: ITT Reference Check
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout pipeline repo (scripts)
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}

      - name: Validate ITT reference in last PR commit
        env:
          GITHUB_TOKEN: ${{ secrets.CSS_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ inputs.source_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: python scripts/itt_check.py

  diff-analysis:
    name: Diff Analysis + Classify + Build Sequence
    needs: itt-check
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: pipeline

      - name: Checkout CSS source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: css-source
          fetch-depth: 0

      - name: Get changed files
        shell: pwsh
        run: |
          $files = git -C css-source diff --name-only "${{ inputs.base_sha }}...${{ inputs.head_sha }}"
          $files | Out-File -FilePath changed_files.txt -Encoding utf8
          Write-Host "--- $($files.Count) files changed ---"
          Get-Content changed_files.txt

      - name: Diff analysis
        shell: pwsh
        run: |
          $files = (Get-Content changed_files.txt | Where-Object { $_ -ne "" }) -join ' '
          if (-not $files) {
            '[]' | Out-File "$env:GITHUB_WORKSPACE/modules.json"
          } else {
            Push-Location css-source
            python "$env:GITHUB_WORKSPACE/pipeline/scripts/diff_analysis.py" --files $files.Split(' ') | Out-File "$env:GITHUB_WORKSPACE/modules.json"
            Pop-Location
          }
          Get-Content "$env:GITHUB_WORKSPACE/modules.json"

      - name: Classify modules
        shell: pwsh
        run: |
          Get-Content "$env:GITHUB_WORKSPACE/modules.json" | `
            python "$env:GITHUB_WORKSPACE/pipeline/scripts/classify_modules.py" --stdin | `
            Out-File "$env:GITHUB_WORKSPACE/classified.json"
          Get-Content "$env:GITHUB_WORKSPACE/classified.json"

      - name: Resolve build sequence
        shell: pwsh
        run: |
          python "$env:GITHUB_WORKSPACE/pipeline/scripts/resolve_build_sequence.py" `
            --modules-json "$env:GITHUB_WORKSPACE/classified.json" `
            --rules "$env:GITHUB_WORKSPACE/pipeline/build-sequence-rules.json" `
            | Out-File "$env:GITHUB_WORKSPACE/waves.json"
          Get-Content "$env:GITHUB_WORKSPACE/waves.json"

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
