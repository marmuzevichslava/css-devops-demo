name: PR Validation (Reusable)

# This workflow is called by css-demo via workflow_call.
# All pipeline logic lives here in css-devops-demo.
# css-demo only has a minimal 5-line caller — so its git history stays clean.
on:
  workflow_dispatch:   # adds "Run workflow" button in css-devops-demo Actions
    inputs:
      test_files:
        description: 'Test files (e.g. client/dialog/azcd01/foo.c)'
        required: false
        default: 'client/dialog/azcd01/foo.c'
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      head_sha:
        required: true
        type: string
      base_sha:
        required: true
        type: string
    secrets:
      CSS_REPO_TOKEN:
        required: true

jobs:
  itt-check:
    name: ITT Reference Check
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout pipeline repo (scripts)
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}

      - name: Validate ITT reference in last PR commit
        env:
          GITHUB_TOKEN: ${{ secrets.CSS_REPO_TOKEN }}
          GITHUB_REPOSITORY: ${{ inputs.source_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: python scripts/itt_check.py

  diff-analysis:
    name: Diff Analysis + Classify + Build Sequence
    needs: itt-check
    # TODO NG: runs-on: [self-hosted, windows, compile]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4
        with:
          repository: marmuzevichslava/css-devops-demo
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: pipeline

      - name: Checkout CSS source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo }}
          ref: ${{ inputs.head_sha }}
          token: ${{ secrets.CSS_REPO_TOKEN }}
          path: css-source
          fetch-depth: 0

      - name: Get changed files
        shell: bash
        run: |
          cd css-source
          git diff --name-only "${{ inputs.base_sha }}...${{ inputs.head_sha }}" | tee ../changed_files.txt
          echo "--- $(wc -l < ../changed_files.txt | tr -d ' ') files changed ---"

      - name: Diff analysis
        shell: bash
        run: |
          FILES=$(cat changed_files.txt | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "[]" > modules.json
          else
            cd css-source
            python $GITHUB_WORKSPACE/pipeline/scripts/diff_analysis.py --files $FILES > $GITHUB_WORKSPACE/modules.json
          fi
          cat $GITHUB_WORKSPACE/modules.json

      - name: Classify modules
        shell: bash
        run: |
          python $GITHUB_WORKSPACE/pipeline/scripts/classify_modules.py --stdin \
            < $GITHUB_WORKSPACE/modules.json | tee $GITHUB_WORKSPACE/classified.json

      - name: Resolve build sequence
        shell: bash
        run: |
          python $GITHUB_WORKSPACE/pipeline/scripts/resolve_build_sequence.py \
            --modules-json $GITHUB_WORKSPACE/classified.json \
            --rules $GITHUB_WORKSPACE/pipeline/build-sequence-rules.json \
            | tee $GITHUB_WORKSPACE/waves.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: pr-analysis-${{ github.run_id }}
          path: |
            modules.json
            classified.json
            waves.json
